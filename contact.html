<!DOCTYPE html>
<html lang="fr">
<head>
    <!-- SEO Contact -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contactez Rey Matour - Développeur Web Freelance Cameroun | Formulaire, WhatsApp, Email">
    <meta name="keywords" content="contact développeur, freelance web, Rey Matour, Cameroon dev">
    
    <!-- OG -->
    <meta property="og:title" content="Contact - Rey Matour">
    <meta property="og:description" content="Discutons de votre projet web! Formulaire sécurisé EmailJS + WhatsApp direct.">
    <meta property="og:image" content="images/profile-portfo.jpg">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Contact Rey">
    
    <!-- FA preload + JS EmailJS -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/styles.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script defer src="js/main.js"></script>
    <title>Contact Rey Matour - Développeur Web | Formulaire EmailJS</title>
</head>
<body>
    <header>
        <a href="index.html" class="logo" aria-label="Accueil">
            Reyes
        </a>
        <nav class="">
            <a href="index.html">Home</a>
            <a href="projects.html">Projets</a>
            <a href="contact.html">Contact</a>
            <a href="faq.html">FAQ</a>
        </nav>
    </header>
    <section class="contact-section" id="contact">
        <div class="contact-title">
            <h1>Me <span>Contacter</span></h1>
            <p>N'hésitez pas à me contacter pour discuter de votre projet</p>
        </div>
        
        <div class="contact-container">
            <div class="contact-form-wrapper">
                <form class="contact-form" id="contact-form" novalidate>
                    <!-- Message status -->
                    <div id="form-status" aria-live="polite" style="margin-bottom: 1rem; padding: 1rem; border-radius: 8px; display: none;"></div>
                    
                    <div class="form-group">
                        <label for="name">Nom <span aria-hidden="true">*</span></label>
                        <input type="text" id="name" name="from_name" placeholder="Votre nom complet" required minlength="2" aria-describedby="name-error">
                        <small id="name-error" class="error-msg">Nom requis (2+ caractères)</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email <span aria-hidden="true">*</span></label>
                        <input type="email" id="email" name="from_email" placeholder="votre@email.com" required aria-describedby="email-error">
                        <small id="email-error" class="error-msg">Email valide requis</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="subject">Sujet <span aria-hidden="true">*</span></label>
                        <input type="text" id="subject" name="subject" placeholder="Ex: Site vitrine e-commerce" required minlength="3" aria-describedby="subject-error">
                        <small id="subject-error" class="error-msg">Sujet requis (3+ caractères)</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="message">Message <span aria-hidden="true">*</span></label>
                        <textarea id="message" name="message" rows="6" placeholder="Décrivez votre projet, besoins techniques, budget..." required minlength="10" aria-describedby="msg-error"></textarea>
                        <small id="msg-error" class="error-msg">Message détaillé requis (10+ caractères)</small>
                    </div>
                    
                    <button type="submit" class="btn-submit">Envoyer le message</button>
                </form>
            </div>
            
            <div class="contact-info">
                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    <span>manfowag@gmail.com</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-phone"></i>
                    <span>+237 680 368 832</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>Cameroun</span>
                </div>
            </div>
        </div>
    </section>
    
    <!-- Floating WhatsApp Button -->
    <a href="https://wa.me/680368832" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>
</body>
</html>
